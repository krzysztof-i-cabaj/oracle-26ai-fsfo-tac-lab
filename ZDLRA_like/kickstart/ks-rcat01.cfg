# ==============================================================================
# Kickstart OL 8.10 - rcat01 (RMAN Recovery Catalog + ZDLRA-like)
# Maszyna VM6 (rozszerzenie LAB-u VMs2-install)
# Haslo zunifikowane: Oracle26ai_LAB!
#
# Source: skopiowany z VMs2-install/kickstart/ks-stby01.cfg, dostosowany dla rcat01:
#   - IP 192.168.56.16, hostname rcat01
#   - Single Instance bez Grid Infrastructure (brak grid user)
#   - 2 dyski: sda 60 GB (OS+/u01), sdb 200 GB LVM (oradata, FRA, lokalny cache backup)
#   - HugePages 1024 (mniejsze SGA, 4 GB RAM)
#   - Mount /mnt/rman_bck (vboxsf) - backupy z PRIM
# ==============================================================================
#version=RHEL8
text
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone Europe/Warsaw --utc

network --bootproto=static --device=enp0s3 --ip=192.168.56.16 --netmask=255.255.255.0 --nameserver=192.168.56.10,8.8.8.8 --activate
network --bootproto=dhcp --device=enp0s8 --activate
network --hostname=rcat01.lab.local

cdrom
# SELinux permissive (NIE enforcing) - LAB-only.
# Powod (2026-05-03 iteracja 7): systemd uruchamiajacy dbstart dostaje denial AVC
# (init_t -> default_t na /u01 - Oracle home nie ma SELinux labelu).
# Inne VMy (prim/stby) uzywaja Grid Infrastructure ktora ma wlasna polityke SELinux
# (.pp policy module Oracle GI). Single Instance bez GI nie ma takiego modulu.
# Permissive loguje denials (mozna review przez ausearch -m AVC) ale nie blokuje.
# Dla produkcji: trzeba zbudowac custom SELinux policy module (audit2allow).
# SELinux permissive (NOT enforcing) - LAB-only. systemd-driven dbstart hits init_t->default_t
# AVC denial on /u01 (Oracle home not SELinux-labeled). Other VMs use GI (with .pp module).
selinux --permissive
# LAB: firewall wylaczony - upraszcza konfiguracje srodowiska testowego.
# LAB: firewall disabled - simplifies lab environment setup.
firewall --disabled

rootpw --plaintext Oracle26ai_LAB!
user --name=kris --plaintext --password=Oracle26ai_LAB! --groups=wheel --gecos="Lab Admin"

services --enabled=chronyd
firstboot --disabled
eula --agreed
skipx

# Partycjonowanie:
#   sda (60 GB OS):
#     /boot 1 GB, swap 4 GB, / 15 GB, /u01 reszta (~40 GB) - Oracle DB binaries
#   sdb (200 GB extra) jako LVM vg_data:
#     /u02 100 GB - oradata CDB RCAT (datafiles + redo + control)
#     /u03 50 GB  - FRA (autobackup controlfile + minimal redo)
#     /u04 reszta (~50 GB) - lokalny cache archivelog dla real-time redo z PRIM
ignoredisk --only-use=sda,sdb
clearpart --all --initlabel --drives=sda,sdb

# UWAGA: VM uruchomiona w trybie EFI (--firmware efi64 w vbox_create_rcat.ps1),
# wymagana partycja /boot/efi (FAT32 ESP). Bez niej Anaconda padnie z bledem.
# NOTE: VM uses EFI firmware - /boot/efi (FAT32 ESP) is REQUIRED. Without it Anaconda fails.
part /boot/efi --fstype=efi --size=600       --ondisk=sda --fsoptions="umask=0077,shortname=winnt"
part /boot     --fstype=xfs --size=1024      --ondisk=sda --label=boot
part swap      --fstype=swap --size=4096     --ondisk=sda
part /         --fstype=xfs --size=15360     --ondisk=sda --label=root
part /u01      --fstype=xfs --size=1 --grow  --ondisk=sda

part pv.01 --size=1 --grow                  --ondisk=sdb
volgroup vg_data pv.01
logvol /u02 --vgname=vg_data --size=102400  --name=lv_oradata --fstype=xfs
logvol /u03 --vgname=vg_data --size=51200   --name=lv_fra     --fstype=xfs
logvol /u04 --vgname=vg_data --size=1 --grow --name=lv_bck    --fstype=xfs

%packages
@^server-product-environment
@development
@system-tools
chrony
vim-enhanced
wget
curl
tar
unzip
net-tools
lsof
strace
tmux
python3
rsync
bash-completion
sshpass
%end

%post --log=/root/ks-post.log
echo "=== [rcat01] POST-INSTALL START ==="
hostnamectl set-hostname rcat01.lab.local

# Tworzenie grup i uzytkownika oracle dla Single Instance.
# UWAGA: brak grid user (Single Instance bez Oracle Restart, auto-start przez systemd)
# NOTE: no grid user (Single Instance without Oracle Restart, auto-start via systemd)
groupadd -g 54321 oinstall
groupadd -g 54322 dba
groupadd -g 54323 oper
groupadd -g 54324 backupdba
groupadd -g 54325 dgdba
groupadd -g 54326 kmdba
groupadd -g 54327 asmadmin
groupadd -g 54328 asmdba
groupadd -g 54329 asmoper
groupadd -g 54330 racdba

# Tylko oracle user (brak grid - Single Instance bez GI)
useradd -u 54322 -g oinstall -G dba,oper,backupdba,dgdba,kmdba,racdba,asmadmin,asmdba,asmoper -m -s /bin/bash oracle
echo "oracle:Oracle26ai_LAB!" | chpasswd

# Katalogi dla bazy RCAT
mkdir -p /u01/app/oracle/product/23.26/dbhome_1
mkdir -p /u01/app/oraInventory
mkdir -p /u02/oradata/RCAT
mkdir -p /u03/fra/RCAT
mkdir -p /u04/local_arch_cache

chown -R oracle:oinstall /u01/app/oracle
chown oracle:oinstall /u01/app/oraInventory
chown -R oracle:oinstall /u02
chown -R oracle:oinstall /u03
chown -R oracle:oinstall /u04
chmod -R 775 /u01 /u02 /u03 /u04
chmod 770 /u01/app/oraInventory

cat > /etc/oraInst.loc <<'ORAINST'
inventory_loc=/u01/app/oraInventory
inst_group=oinstall
ORAINST
chown root:root /etc/oraInst.loc
chmod 644 /etc/oraInst.loc

# Katalogi wspoldzielone (Shared Folders VirtualBox)
# OracleBinaries: source binarki Oracle 23.26.1 (RO)
# rman_bck: target backupow RMAN (RW) - wspolny z PRIM/STBY
mkdir -p /mnt/oracle_binaries
echo "OracleBinaries  /mnt/oracle_binaries  vboxsf  rw,uid=54322,gid=54321,dmode=775,fmode=664,nofail  0  0" >> /etc/fstab
mkdir -p /mnt/rman_bck
echo "_RMAN_BCK_from_Linux_  /mnt/rman_bck  vboxsf  rw,uid=54322,gid=54321,dmode=775,fmode=664,nofail  0  0" >> /etc/fstab

# Disable Transparent Huge Pages (Oracle requirement)
cat > /etc/systemd/system/disable-thp.service <<'THPEOF'
[Unit]
Description=Disable Transparent Huge Pages
DefaultDependencies=no
After=sysinit.target local-fs.target

[Service]
Type=oneshot
ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled; echo never > /sys/kernel/mm/transparent_hugepage/defrag'
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
THPEOF
systemctl enable disable-thp.service

# HugePages dla SGA (512 x 2 MB = 1 GB) + memlock unlimited.
# rcat01 = 4 GB RAM total. Wczesniej bylo 1024 (2 GB) - powodowalo memory pressure
# przy pierwszym boocie (kernel oops + systemd-journald watchdog crash, 2026-05-03).
# 512 zostawia ~3 GB dla systemu/journal/LVM. SGA dla katalogu RMAN ~800 MB wystarczy.
# rcat01 = 4 GB RAM total. Reduced from 1024 (caused memory pressure on first boot).
# 512 leaves ~3 GB for system. SGA for RMAN catalog ~800 MB is sufficient.
cat > /etc/sysctl.d/99-oracle-hugepages.conf <<'HPEOF'
vm.nr_hugepages = 512
vm.hugetlb_shm_group = 54322
HPEOF

cat > /etc/security/limits.d/zz-oracle-memlock.conf <<'MLEOF'
oracle  soft  memlock  unlimited
oracle  hard  memlock  unlimited
MLEOF

# DNS: wymus 192.168.56.10 jako resolver na enp0s3, ignoruj auto-DNS z NAT (enp0s8).
# WAZNE (lesson learned 2026-05-03 iteracja 3): 'nmcli connection modify' aktualizuje
# tylko persistent config, NIE aktywne polaczenie. Bez 'nmcli connection up' resolv.conf
# pozostaje stary (z auto-DNS routera 192.168.1.1 push przez NAT DHCP -> NXDOMAIN
# blokuje queries do 192.168.56.10 dla *.lab.local).
# IMPORTANT (lesson 2026-05-03 it.3): 'nmcli connection modify' updates persistent only.
# Without 'nmcli connection up', resolv.conf keeps DHCP-pushed DNS that returns NXDOMAIN
# for *.lab.local, blocking subsequent server queries (glibc resolver behavior).
nmcli connection modify "System enp0s8" ipv4.ignore-auto-dns yes 2>/dev/null || true
nmcli connection modify "System enp0s3" ipv4.dns "192.168.56.10"  2>/dev/null || true
nmcli connection modify "System enp0s3" ipv4.dns-search "lab.local" 2>/dev/null || true
nmcli connection modify "System enp0s3" ipv4.ignore-auto-dns yes   2>/dev/null || true

# Zaaplikuj zmiany na ACTIVE connections (krytyczne - bez tego config jest tylko persystentny)
# Apply changes to ACTIVE connections (critical - without this config is only persistent)
nmcli connection up "System enp0s3" 2>/dev/null || true
nmcli connection up "System enp0s8" 2>/dev/null || true

# NTP: chrony klient synchronizujacy z infra01.
cat > /etc/chrony.conf <<'CHRONYEOF'
server 192.168.56.10 iburst prefer
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
leapsectz right/UTC
keyfile /etc/chrony.keys
logdir /var/log/chrony
CHRONYEOF
systemctl enable --now chronyd

# Oracle Database preinstall RPM (kernel params, limits, packages dla DB 23ai)
dnf config-manager --enable ol8_appstream ol8_addons ol8_codeready_builder 2>/dev/null || true
dnf install -y oracle-database-preinstall-23ai
dnf update -y

# /etc/oratab pre-populated (DBCA dopisze finalna linijke).
# Format: SID:ORACLE_HOME:auto_start_flag (Y = dbstart bedzie startowal te baze)
# UWAGA: chmod 664 + chown root:oinstall (Oracle convention) - user oracle (czlonek
# oinstall) edytuje BEZ sudo. Bez tego dbca_create_rcat.sh wisi na 'sudo sed'
# (incydent 2026-05-03 - timeout hasla, script wyrzucal blad zanim doszedl do koncowej walidacji).
# IMPORTANT: chmod 664 + root:oinstall (Oracle convention) - oracle user can edit
# WITHOUT sudo. Without this dbca_create_rcat.sh hangs on 'sudo sed' password prompt.
echo "# /etc/oratab - populated by DBCA later. Format: SID:ORACLE_HOME:Y|N" > /etc/oratab
chown root:oinstall /etc/oratab
chmod 664 /etc/oratab

# Zunifikowane LAB secrets (konwencja VMs2-install).
# Skrypty .sh ze sciezki /tmp/scripts source'uja ten plik i uzywaja $LAB_PASS.
# Unified LAB secrets (VMs2-install convention). Scripts source this and use $LAB_PASS.
cat > /root/.lab_secrets <<'SECRETS'
export LAB_PASS='Oracle26ai_LAB!'
SECRETS
chmod 600 /root/.lab_secrets
chown root:root /root/.lab_secrets

# Skopiuj rowniez do home oracle (skrypty rman_*.sh dziala jako oracle z $HOME/.lab_secrets fallback)
cat > /home/oracle/.lab_secrets <<'SECRETS'
export LAB_PASS='Oracle26ai_LAB!'
SECRETS
chmod 600 /home/oracle/.lab_secrets
chown oracle:oinstall /home/oracle/.lab_secrets

echo "=== [rcat01] POST-INSTALL DONE ==="
%end
reboot
