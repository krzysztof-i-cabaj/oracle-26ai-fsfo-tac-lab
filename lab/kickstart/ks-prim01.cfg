# ==============================================================================
# Kickstart OL 8.10 — prim01 (Primary RAC node 1)
# Maszyna VM1
# Haslo zunifikowane: Oracle26ai_LAB!
# ==============================================================================
#version=RHEL8
text
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone Europe/Warsaw --utc

network --bootproto=static --device=enp0s3 --ip=192.168.56.11 --netmask=255.255.255.0 --nameserver=192.168.56.10,8.8.8.8 --activate
network --bootproto=static --device=enp0s8 --ip=192.168.100.11 --netmask=255.255.255.0 --nodefroute --activate
network --bootproto=static --device=enp0s9 --ip=192.168.200.11 --netmask=255.255.255.0 --nodefroute --activate
network --bootproto=dhcp --device=enp0s10 --activate
network --hostname=prim01.lab.local

cdrom
selinux --enforcing
# LAB: firewall wyłączony — cluvfy (GI pre-req check) wymaga pełnej TCP łączności między węzłami.
# LAB: firewall disabled — cluvfy requires unrestricted TCP between RAC nodes.
firewall --disabled

rootpw --plaintext Oracle26ai_LAB!
user --name=kris --plaintext --password=Oracle26ai_LAB! --groups=wheel --gecos="Lab Admin"

services --enabled=chronyd
firstboot --disabled
eula --agreed
skipx

ignoredisk --only-use=sda
clearpart --all --initlabel --drives=sda
part /boot --fstype=xfs  --size=1024        --ondisk=sda --label=boot
part swap  --fstype=swap --size=8192        --ondisk=sda
part /     --fstype=xfs  --size=15360       --ondisk=sda --label=root
part /u01  --fstype=xfs  --size=35840       --ondisk=sda

%packages
@^server-product-environment
@development
@system-tools
chrony
vim-enhanced
wget
curl
tar
unzip
net-tools
lsof
strace
tmux
python3
rsync
bash-completion
sshpass
%end

%post --log=/root/ks-post.log
echo "=== [prim01] POST-INSTALL START ==="
hostnamectl set-hostname prim01.lab.local

groupadd -g 54321 oinstall
groupadd -g 54322 dba
groupadd -g 54323 oper
groupadd -g 54324 backupdba
groupadd -g 54325 dgdba
groupadd -g 54326 kmdba
groupadd -g 54327 asmadmin
groupadd -g 54328 asmdba
groupadd -g 54329 asmoper
groupadd -g 54330 racdba

useradd -u 54321 -g oinstall -G asmadmin,asmdba,asmoper,dba,racdba -m -s /bin/bash grid
useradd -u 54322 -g oinstall -G dba,oper,backupdba,dgdba,kmdba,racdba,asmadmin,asmdba,asmoper -m -s /bin/bash oracle

echo "grid:Oracle26ai_LAB!" | chpasswd
echo "oracle:Oracle26ai_LAB!" | chpasswd

mkdir -p /u01/app/grid
mkdir -p /u01/app/23.26/grid
mkdir -p /u01/app/oracle/product/23.26/dbhome_1
mkdir -p /u01/app/oraInventory

chown -R grid:oinstall /u01/app/grid
chown -R grid:oinstall /u01/app/23.26/grid
chown -R oracle:oinstall /u01/app/oracle
chown grid:oinstall /u01/app/oraInventory
chmod -R 775 /u01
chmod 770 /u01/app/oraInventory

# /etc/oraInst.loc — wymagany przez gridSetup.sh przed instalacją GI.
# /etc/oraInst.loc — required by gridSetup.sh before GI installation.
cat > /etc/oraInst.loc <<'ORAINST'
inventory_loc=/u01/app/oraInventory
inst_group=oinstall
ORAINST
chown root:root /etc/oraInst.loc
chmod 644 /etc/oraInst.loc

# Katalogi wspoldzielone (Shared Folders VirtualBox)
mkdir -p /mnt/oracle_binaries
echo "OracleBinaries  /mnt/oracle_binaries  vboxsf  rw,uid=54322,gid=54321,dmode=775,fmode=664,nofail  0  0" >> /etc/fstab
mkdir -p /mnt/rman_bck
echo "_RMAN_BCK_from_Linux_  /mnt/rman_bck  vboxsf  rw,uid=54322,gid=54321,dmode=775,fmode=664,nofail  0  0" >> /etc/fstab

cat > /etc/systemd/system/disable-thp.service <<'THPEOF'
[Unit]
Description=Disable Transparent Huge Pages
DefaultDependencies=no
After=sysinit.target local-fs.target

[Service]
Type=oneshot
ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled; echo never > /sys/kernel/mm/transparent_hugepage/defrag'
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
THPEOF
systemctl enable disable-thp.service

# F-18.A: HugePages dla SGA (2200 x 2 MB = 4.4 GB) + grupa SHM = dba (gid 54322).
# Wartosc dobrana pod SGA ~4 GB; po stworzeniu bazy mozna doprecyzowac:
#   round(SGA_max_size / 2 MB) + ~10 % zapasu.
# F-18.A: HugePages for SGA (2200 x 2 MB = 4.4 GB), shm group = dba (gid 54322).
cat > /etc/sysctl.d/99-oracle-hugepages.conf <<'HPEOF'
vm.nr_hugepages = 2200
vm.hugetlb_shm_group = 54322
HPEOF

# F-18.A: memlock unlimited dla oracle/grid (Oracle wymaga przy use_large_pages=ONLY i lock_sga=TRUE).
# F-18.A: memlock unlimited for oracle/grid (required for use_large_pages=ONLY + lock_sga=TRUE).
cat > /etc/security/limits.d/zz-oracle-memlock.conf <<'MLEOF'
oracle  soft  memlock  unlimited
oracle  hard  memlock  unlimited
grid    soft  memlock  unlimited
grid    hard  memlock  unlimited
MLEOF

# F-18.D: Jumbo frames (MTU 9000) na enp0s9 (storage NIC dla iSCSI 192.168.200.x).
# Wymaga rowniez MTU 9000 po stronie infra01. Test po rebooice: ping -M do -s 8972 192.168.200.10
# F-18.D: Jumbo frames on enp0s9 (storage iSCSI). Test after reboot: ping -M do -s 8972 192.168.200.10
nmcli connection modify "System enp0s9" 802-3-ethernet.mtu 9000 || \
  nmcli connection modify "Wired connection 3" 802-3-ethernet.mtu 9000 || true

# DNS: wymus 192.168.56.10 jako resolver na enp0s3 (DHCP enp0s10 moze nadpisac resolv.conf).
nmcli connection modify "System enp0s10" ipv4.ignore-auto-dns yes 2>/dev/null || true
nmcli connection modify "System enp0s3"  ipv4.dns "192.168.56.10"  2>/dev/null || true
nmcli connection modify "System enp0s3"  ipv4.dns-search "lab.local" 2>/dev/null || true
nmcli connection modify "System enp0s3"  ipv4.ignore-auto-dns yes   2>/dev/null || true

# NTP: chrony klient synchronizujacy z infra01.
# Uzywamy IP (192.168.56.10) zamiast hostname — DNS moze jeszcze nie byc gotowy przy pierwszym boocie.
cat > /etc/chrony.conf <<'CHRONYEOF'
server 192.168.56.10 iburst prefer
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
leapsectz right/UTC
keyfile /etc/chrony.keys
logdir /var/log/chrony
CHRONYEOF
systemctl enable --now chronyd

dnf config-manager --enable ol8_appstream ol8_addons ol8_codeready_builder 2>/dev/null || true
dnf install -y oracle-database-preinstall-23ai iscsi-initiator-utils
dnf update -y
echo "=== [prim01] POST-INSTALL DONE ==="
%end
reboot
