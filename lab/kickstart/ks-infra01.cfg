# ==============================================================================
# Kickstart OL 8.10 — infra01 (DNS bind9 + NTP + iSCSI target + Observer)
# Maszyna VM4
# Haslo zunifikowane: Oracle26ai_LAB!
# ==============================================================================
#version=RHEL8
text
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone Europe/Warsaw --utc

network --bootproto=static --device=enp0s3 --ip=192.168.56.10 --netmask=255.255.255.0 --nameserver=127.0.0.1,8.8.8.8 --activate
network --bootproto=static --device=enp0s8 --ip=192.168.100.10 --netmask=255.255.255.0 --nodefroute --activate
network --bootproto=static --device=enp0s9 --ip=192.168.200.10 --netmask=255.255.255.0 --nodefroute --activate
network --bootproto=dhcp --device=enp0s10 --activate
network --hostname=infra01.lab.local

cdrom
selinux --enforcing
firewall --disabled

# Globalne haslo laboratoryjne
rootpw --plaintext Oracle26ai_LAB!
user --name=kris --plaintext --password=Oracle26ai_LAB! --groups=wheel --gecos="Lab Admin"

services --enabled=chronyd
firstboot --disabled
eula --agreed
skipx

# Dysk OS (sda), dysk iSCSI LUN (sdb - nie partycjonowany tutaj)
ignoredisk --only-use=sda
clearpart --all --initlabel --drives=sda
part /boot --fstype=xfs  --size=1024        --ondisk=sda --label=boot
part swap  --fstype=swap --size=4096        --ondisk=sda
part /     --fstype=xfs  --size=1 --grow    --ondisk=sda --label=root

%packages
@^server-product-environment
@development
@system-tools
@network-server
bind
bind-utils
targetcli
chrony
vim-enhanced
wget
curl
tar
unzip
net-tools
lsof
strace
tmux
python3
python3-pip
rsync
bash-completion
sshpass
%end

%post --log=/root/ks-post.log
echo "=== [infra01] POST-INSTALL START ==="
hostnamectl set-hostname infra01.lab.local

# Tworzenie grup i uzytkownika dla Oracle
groupadd -g 54321 oinstall
groupadd -g 54322 dba
groupadd -g 54325 dgdba
useradd -u 54322 -g oinstall -G dba,dgdba -m -s /bin/bash oracle
echo "oracle:Oracle26ai_LAB!" | chpasswd

# --- LVM setup dla iSCSI block backstore (Najwyzsza wydajnosc dla VM) ---
if [ -b /dev/sdb ]; then
    pvcreate -ff -y /dev/sdb
    vgcreate vg_iscsi /dev/sdb
    lvcreate -L 5G  -n lun_ocr1  vg_iscsi
    lvcreate -L 5G  -n lun_ocr2  vg_iscsi
    lvcreate -L 5G  -n lun_ocr3  vg_iscsi
    lvcreate -L 20G -n lun_data1 vg_iscsi
    lvcreate -L 15G -n lun_reco1 vg_iscsi
    echo "[$(date)] LVM utworzone na /dev/sdb - vg_iscsi z 5 LV-ami" >> /root/install.log
fi

# S28-52-bis: Kernel sysctl dla Oracle Client (PRVG-1205) — infra01 nie ma preinstall RPM.
cat > /etc/sysctl.d/97-oracle-client.conf <<'SYSCTLEOF'
fs.file-max = 6815744
fs.aio-max-nr = 1048576
net.core.rmem_default = 262144
net.core.rmem_max = 4194304
net.core.wmem_default = 262144
net.core.wmem_max = 1048576
net.ipv4.ip_local_port_range = 9000 65500
SYSCTLEOF
sysctl -p /etc/sysctl.d/97-oracle-client.conf || true

# Katalogi dla Observera (Master obs_ext)
mkdir -p /etc/oracle/tns/obs_ext
mkdir -p /etc/oracle/wallet/obs_ext
mkdir -p /var/log/oracle/obs_ext
chown oracle:oinstall /etc/oracle/tns/obs_ext /etc/oracle/wallet/obs_ext /var/log/oracle/obs_ext
chmod 700 /etc/oracle/wallet/obs_ext

# DNS fixes
nmcli connection modify "System enp0s10" ipv4.ignore-auto-dns yes 2>/dev/null || true
nmcli connection modify "System enp0s3" ipv4.dns "127.0.0.1" 2>/dev/null || true
nmcli connection modify "System enp0s3" ipv4.dns-search "lab.local" 2>/dev/null || true
nmcli connection modify "System enp0s3" ipv4.ignore-auto-dns yes 2>/dev/null || true

# Katalogi wspoldzielone (Shared Folders VirtualBox)
mkdir -p /mnt/oracle_binaries
echo "OracleBinaries  /mnt/oracle_binaries  vboxsf  rw,uid=54322,gid=54321,dmode=775,fmode=664,nofail  0  0" >> /etc/fstab
mkdir -p /mnt/rman_bck
echo "_RMAN_BCK_from_Linux_  /mnt/rman_bck  vboxsf  rw,uid=54322,gid=54321,dmode=775,fmode=664,nofail  0  0" >> /etc/fstab

# Wylacz THP (Transparent Huge Pages)
cat > /etc/systemd/system/disable-thp.service <<'THPEOF'
[Unit]
Description=Disable Transparent Huge Pages
DefaultDependencies=no
After=sysinit.target local-fs.target

[Service]
Type=oneshot
ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled; echo never > /sys/kernel/mm/transparent_hugepage/defrag'
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
THPEOF
systemctl enable disable-thp.service

# F-18.D: Jumbo frames (MTU 9000) na enp0s9 (storage NIC dla iSCSI 192.168.200.x).
# Wymagane symetrycznie po stronie prim01/prim02 inicjatorow iSCSI.
# F-18.D: Jumbo frames on enp0s9 (storage iSCSI). Symmetric on prim01/prim02 initiators.
nmcli connection modify "System enp0s9" 802-3-ethernet.mtu 9000 || \
  nmcli connection modify "Wired connection 3" 802-3-ethernet.mtu 9000 || true

# === DNS: bind9 (named) — strefa lab.local ===
# bind i bind-utils zainstalowane w %packages; ten blok tworzy named.conf + zone files.
# DNS fixes na enp0s3 juz wyzej (nameserver 127.0.0.1).
cat > /etc/named.conf <<'NAMEDEOF'
options {
    listen-on port 53 { 127.0.0.1; 192.168.56.10; };
    listen-on-v6 port 53 { none; };
    directory     "/var/named";
    dump-file     "/var/named/data/cache_dump.db";
    statistics-file "/var/named/data/named_stats.txt";
    allow-query   { localhost; 192.168.56.0/24; 192.168.100.0/24; 192.168.200.0/24; };
    recursion yes;
    forwarders    { 8.8.8.8; 1.1.1.1; };
    forward first;
    dnssec-validation auto;
};
logging {
    channel default_debug { file "data/named.run"; severity dynamic; };
};
zone "." IN { type hint; file "named.ca"; };
zone "lab.local" IN {
    type master; file "db.lab.local"; allow-update { none; };
};
zone "56.168.192.in-addr.arpa" IN {
    type master; file "db.56.168.192"; allow-update { none; };
};
zone "100.168.192.in-addr.arpa" IN {
    type master; file "db.100.168.192"; allow-update { none; };
};
NAMEDEOF

cat > /var/named/db.lab.local <<'ZONEEOF'
$TTL 86400
@       IN SOA  infra01.lab.local. admin.lab.local. (
                2026042801 3600 900 1209600 3600 )
        IN NS   infra01.lab.local.
infra01      IN A  192.168.56.10
prim01       IN A  192.168.56.11
prim02       IN A  192.168.56.12
stby01       IN A  192.168.56.13
client01     IN A  192.168.56.15
prim01-vip   IN A  192.168.56.21
prim02-vip   IN A  192.168.56.22
scan-prim    IN A  192.168.56.31
scan-prim    IN A  192.168.56.32
scan-prim    IN A  192.168.56.33
prim01-priv  IN A  192.168.100.11
prim02-priv  IN A  192.168.100.12
infra01-priv IN A  192.168.100.10
prim01-stor  IN A  192.168.200.11
prim02-stor  IN A  192.168.200.12
infra01-stor IN A  192.168.200.10
ZONEEOF

cat > /var/named/db.56.168.192 <<'ZONEEOF'
$TTL 86400
@  IN SOA  infra01.lab.local. admin.lab.local. (
           2026042801 3600 900 1209600 3600 )
   IN NS   infra01.lab.local.
10 IN PTR  infra01.lab.local.
11 IN PTR  prim01.lab.local.
12 IN PTR  prim02.lab.local.
13 IN PTR  stby01.lab.local.
15 IN PTR  client01.lab.local.
21 IN PTR  prim01-vip.lab.local.
22 IN PTR  prim02-vip.lab.local.
31 IN PTR  scan-prim.lab.local.
32 IN PTR  scan-prim.lab.local.
33 IN PTR  scan-prim.lab.local.
ZONEEOF

cat > /var/named/db.100.168.192 <<'ZONEEOF'
$TTL 86400
@  IN SOA  infra01.lab.local. admin.lab.local. (
           2026042801 3600 900 1209600 3600 )
   IN NS   infra01.lab.local.
10 IN PTR  infra01-priv.lab.local.
11 IN PTR  prim01-priv.lab.local.
12 IN PTR  prim02-priv.lab.local.
ZONEEOF

chown root:named /var/named/db.lab.local /var/named/db.56.168.192 /var/named/db.100.168.192
chmod 640 /var/named/db.lab.local /var/named/db.56.168.192 /var/named/db.100.168.192
named-checkconf && named-checkzone lab.local /var/named/db.lab.local >> /root/install.log 2>&1 || \
    echo "WARN: named-checkconf/zone FAIL — sprawdz /root/install.log" >> /root/install.log
systemctl enable --now named

# === NTP: chrony serwer dla lab.local ===
cat > /etc/chrony.conf <<'CHRONYEOF'
pool pool.ntp.org iburst maxsources 4
allow 192.168.56.0/24
allow 192.168.100.0/24
allow 192.168.200.0/24
local stratum 10
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
leapsectz right/UTC
keyfile /etc/chrony.keys
logdir /var/log/chrony
CHRONYEOF
systemctl enable --now chronyd

dnf config-manager --enable ol8_appstream ol8_addons ol8_codeready_builder 2>/dev/null || true
dnf update -y
echo "=== [infra01] POST-INSTALL DONE ==="
%end
reboot
